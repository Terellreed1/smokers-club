<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Luxury Courier Club | Premium Cannabis Delivery</title>
    <meta name="description" content="Luxury Courier Club offers premium cannabis delivery with curated top-shelf flower, edibles, and concentrates. Discreet, fast, and elevated. 21+ only." />
    <meta name="keywords" content="premium cannabis, luxury flower, cannabis delivery, THC flower, curated strains, edibles, concentrates, Luxury Courier Club" />
    <meta name="author" content="Luxury Courier Club" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://luxurycourier.club" />

    <!-- Favicon -->
    <link rel="icon" href="/logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Luxury Courier Club" />
    <meta property="og:title" content="Luxury Courier Club | Premium Cannabis Delivery" />
    <meta property="og:description" content="Luxury Courier Club offers premium cannabis delivery with curated top-shelf flower, edibles, and concentrates. Discreet, fast, and elevated. 21+ only." />
    <meta property="og:url" content="https://luxurycourier.club" />
    <meta property="og:image" content="https://luxurycourier.club/logo.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="Luxury Courier Club Logo" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Luxury Courier Club | Premium Cannabis Delivery" />
    <meta name="twitter:description" content="Luxury Courier Club offers premium cannabis delivery with curated top-shelf flower, edibles, and concentrates. Discreet, fast, and elevated. 21+ only." />
    <meta name="twitter:image" content="https://luxurycourier.club/logo.png" />
    <meta name="twitter:image:alt" content="Luxury Courier Club Logo" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#1a1510" />
    <meta name="msapplication-TileColor" content="#1a1510" />

    <!-- JSON-LD: LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Luxury Courier Club",
      "description": "Premium cannabis delivery service offering curated top-shelf flower, edibles, and concentrates",
      "url": "https://luxurycourier.club",
      "image": "https://luxurycourier.club/logo.png",
      "priceRange": "$$$",
      "areaServed": [
        { "@type": "State", "name": "Maryland" },
        { "@type": "State", "name": "Virginia" },
        { "@type": "State", "name": "District of Columbia" }
      ]
    }
    </script>

    <!-- JSON-LD: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Luxury Courier Club",
      "url": "https://luxurycourier.club"
    }
    </script>

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Luxury Courier Club",
      "url": "https://luxurycourier.club",
      "logo": "https://luxurycourier.club/logo.png",
      "sameAs": []
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
